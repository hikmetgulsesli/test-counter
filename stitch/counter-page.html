<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minimalist Central Counter</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display overflow-hidden">
<!-- Top Navigation -->
<header class="w-full flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 py-4 lg:px-12">
<div class="flex items-center gap-3 text-slate-900 dark:text-white">
<div class="size-8 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">calculate</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">Counter</h2>
</div>
<div class="flex items-center gap-6">
<button class="flex items-center justify-center rounded-full h-9 px-5 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-200 text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="mr-2 material-symbols-outlined text-[18px]">history</span>
                History
            </button>
<button class="flex items-center justify-center rounded-full h-9 px-5 bg-red-500/10 text-red-600 dark:text-red-400 text-sm font-medium hover:bg-red-500/20 transition-colors">
<span class="mr-2 material-symbols-outlined text-[18px]">restart_alt</span>
                Reset
            </button>
<div class="bg-center bg-no-repeat bg-cover rounded-full size-10 border-2 border-slate-200 dark:border-slate-700 cursor-pointer" data-alt="User profile avatar placeholder" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB6QftTvu0wd_CGQJpQRNHnL931Uh55GPe8YBwMJQUTImY4bQcEWYH5EOP8NKgOqGO3dWSwwSnzsMjNr6PB8FgyVh6GTuyautOuearCq1KxL1Ryp-wXmM6bxo6IgbeLtOuCuAR6qmS9tTJ8tmQQgLWhoqOPI_6mjCn0mBaXmmFY4Nwc-KkYcQeKt9FsPO-N0kxLO2Q8xYJghWI4XKbRtSvzJTOALg0uIy_SRRUoqiWXMOgkTF-aH5GOzkCxd9sFIhpyIHyeqbLQob0");'></div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center p-6 relative">
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Central Card Container -->
<div class="relative w-full max-w-md bg-white dark:bg-[#1e293b] rounded-xl shadow-xl dark:shadow-none border border-slate-100 dark:border-slate-700/50 p-12 flex flex-col items-center justify-center gap-10">
<!-- Counter Display -->
<div class="flex flex-col items-center gap-2">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest">Current Count</span>
<h1 class="text-[120px] leading-none font-bold text-slate-900 dark:text-white tracking-tighter tabular-nums selection:bg-primary/30">120</h1>
</div>
<!-- Main Action Button -->
<div class="flex items-center gap-6 w-full justify-center">
<button aria-label="Decrease count" class="group relative flex items-center justify-center size-20 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all duration-300 shadow-sm active:scale-95">
<span class="material-symbols-outlined text-[32px] group-hover:scale-110 transition-transform">remove</span>
</button>
<button aria-label="Increase count" class="group relative flex items-center justify-center size-24 rounded-full bg-primary text-white shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:scale-105 active:scale-95 transition-all duration-300 z-10">
<div class="absolute inset-0 rounded-full border border-white/20"></div>
<span class="material-symbols-outlined text-[48px] group-hover:rotate-90 transition-transform duration-300">add</span>
</button>
</div>
<!-- Hint Text -->
<p class="text-slate-400 dark:text-slate-500 text-sm font-medium text-center">
                Press <kbd class="px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded-md border border-slate-200 dark:border-slate-700 mx-1 text-xs text-slate-600 dark:text-slate-300 font-sans">+</kbd> or Space to increment
            </p>
</div>
<!-- Stats Row -->
<div class="mt-12 grid grid-cols-3 gap-6 w-full max-w-2xl px-4">
<div class="flex flex-col items-center justify-center p-4 rounded-lg bg-white/50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 backdrop-blur-sm">
<span class="text-xs text-slate-500 dark:text-slate-400 mb-1">Peak</span>
<span class="text-xl font-bold text-slate-900 dark:text-white">145</span>
</div>
<div class="flex flex-col items-center justify-center p-4 rounded-lg bg-white/50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 backdrop-blur-sm">
<span class="text-xs text-slate-500 dark:text-slate-400 mb-1">Daily Avg</span>
<span class="text-xl font-bold text-slate-900 dark:text-white">82</span>
</div>
<div class="flex flex-col items-center justify-center p-4 rounded-lg bg-white/50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 backdrop-blur-sm">
<span class="text-xs text-slate-500 dark:text-slate-400 mb-1">Session</span>
<span class="text-xl font-bold text-slate-900 dark:text-white">12m</span>
</div>
</div>
</main>
</body></html>
